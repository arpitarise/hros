<!-- Added data-type="module" and data-presets to fix Babel parsing -->
<script type="text/babel" data-type="module" data-presets="react,env">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const PWD_KEY = 'arise_sys_pwd';
const SIG_KEY = 'arise_pdf_signatures'; 
const MONTH_KEY = 'arise_active_month_v6';

// Support for 2 Isolated Months Configuration
const MONTHS = [
    { id: 'MAY_2026', label: 'May 2026', short: 'MAY-26', days: 31, weekends: [3, 10, 17, 24, 31], startOffset: 4, dbKey: 'arise_modern_db_v5' },
    { id: 'JUN_2026', label: 'June 2026', short: 'JUN-26', days: 30, weekends: [7, 14, 21, 28], startOffset: 0, dbKey: 'arise_modern_db_jun_26' }
];

const DAY_NAMES = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

// Date Formatter Helper
const formatDate = (dStr) => {
    if(!dStr) return "";
    const pts = dStr.split('-');
    if(pts.length === 3) return `${pts[2]}/${pts[1]}/${pts[0]}`;
    return dStr;
};

// Time Options Generators
const generateTimeOptions = (startHr, startMin, endHr, endMin) => {
    const times = [];
    let h = startHr, m = startMin;
    while (h < endHr || (h === endHr && m <= endMin)) {
        const ampm = h >= 12 ? 'PM' : 'AM';
        const displayH = h > 12 ? h - 12 : (h === 0 ? 12 : h);
        const displayM = m.toString().padStart(2, '0');
        times.push(`${displayH}:${displayM} ${ampm}`);
        m += 5;
        if (m >= 60) { m -= 60; h++; }
    }
    return times;
};
const inTimeOptions = generateTimeOptions(8, 30, 11, 0); // 8:30 AM to 11:00 AM
const outTimeOptions = generateTimeOptions(16, 0, 21, 0); // 4:00 PM to 9:00 PM

const SUGGESTED_IN_TIMES = ['9:00 AM', '9:30 AM', '10:00 AM', '10:30 AM'];
const SUGGESTED_OUT_TIMES = ['5:30 PM', '6:00 PM', '6:30 PM', '7:00 PM'];

const formatTimeInput = (time24) => {
    if(!time24) return "";
    let [h, m] = time24.split(':');
    h = parseInt(h, 10);
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${h}:${m} ${ampm}`;
};

// Dynamic Computation based on selected Month Configuration
const compute = (emp, monthConf) => {
    let pr = 0, pOnly = 0, ab = 0, ot = 0, t = 0, wo = 0, h = 0, pMiss = 0;
    let autoWoDays = {};
    const isE = String(emp.type || "").trim().toUpperCase() === "E";
    const { days, weekends } = monthConf;

    for (let w of weekends) {
        if (!emp[`d${w}`]) {
            let sum = 0;
            for (let i = Math.max(1, w - 6); i < w; i++) {
                const a = String(emp[`d${i}`] || "").trim().toUpperCase();
                if (a === 'P' || a === 'P?' || a === 'T' || a === 'W/O') sum += 1;
                if (a === '0.5' || a === 'H') sum += 0.5;
            }
            if (sum >= 4) autoWoDays[w] = "W/O";
        }
    }

    for (let i = 1; i <= days; i++) {
        const manual = String(emp[`d${i}`] || "").trim().toUpperCase();
        const a = manual || autoWoDays[i] || "";
        const isSunday = weekends.includes(i);
        const o = String(emp[`ot${i}`] || "").trim();

        let getsExtraWo = false;
        if (isE && isSunday && manual && ['P', 'P?', 'H', '0.5', 'T'].includes(manual)) getsExtraWo = true;

        if (a === "P") { pr += 1; pOnly += 1; }
        else if (a === "P?") { pr += 1; pOnly += 1; pMiss += 1; } 
        else if (a === "T") { pr += 1; t += 1; }
        else if (a === "W/O") { pr += 1; wo += 1; }
        else if (a === "0.5" || a === "H") { pr += 0.5; h += 1; }
        else if (a === "A") ab += 1;

        if (getsExtraWo) { pr += 1; wo += 1; }
        if (o && !isNaN(parseFloat(o))) ot += parseFloat(o);
    }

    const bas = parseFloat(emp.basicSalary) || 0;
    const pBal = parseFloat(emp.previousBalance) || 0;
    const adv = parseFloat(emp.advance) || 0;
    const pd = bas > 0 ? bas / days : 0;
    const ph = pd > 0 ? pd / 8.5 : 0;
    
    const ms = Math.round(pr * pd);
    const dos = Math.round(ot * ph);
    const act = ms + dos;
    const bal = act + pBal;
    const pay = bal - adv;

    return { 
        ...emp, 
        present: pr, pOnly, absent: ab, otHrs: ot, tour: t, wo, half: h, pMiss, autoWoDays, 
        workingDays: pr, perDaySalary: pd, perHrSalary: ph, monthlySalary: ms, 
        dailyOtSalary: dos, actualMonthly: act, balance: bal, salaryToBePaid: pay,
        joiningDate: emp.joiningDate || ""
    };
};

const defaultEmp = (monthConf) => {
    const e = { id: Date.now().toString(), name: "New Employee", dept: "PRODUCTION", code: `EMP-${Math.floor(Math.random()*1000)}`, type: "E", basicSalary: 0, previousBalance: 0, advance: 0, joiningDate: "" };
    for (let i = 1; i <= monthConf.days; i++) { e[`d${i}`] = ""; e[`ot${i}`] = ""; e[`c${i}`] = ""; e[`in${i}`] = ""; e[`out${i}`] = ""; }
    return compute(e, monthConf);
};

const Icon = ({ path, className="w-5 h-5" }) => (
<svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d={path}></path>
</svg>
);

const OwnerDashboard = ({ db, activeConf }) => {
    const stats = useMemo(() => {
        let totalBasic = 0, totalEarned = 0, totalPayout = 0, totalAdvance = 0, totalOTCost = 0, totalOTHours = 0;
        let totalAbsent = 0, totalPresent = 0, totalMissingPunches = 0;
        const deptCosts = {};
        const newJoiners = [];

        db.forEach(emp => {
            totalBasic += (parseFloat(emp.basicSalary) || 0);
            totalEarned += (parseFloat(emp.actualMonthly) || 0);
            totalPayout += Math.max(0, parseFloat(emp.salaryToBePaid) || 0); 
            totalAdvance += (parseFloat(emp.advance) || 0);
            totalOTCost += (parseFloat(emp.dailyOtSalary) || 0);
            totalOTHours += (parseFloat(emp.otHrs) || 0);
            totalAbsent += (parseFloat(emp.absent) || 0);
            totalPresent += (parseFloat(emp.workingDays) || 0);
            totalMissingPunches += (parseFloat(emp.pMiss) || 0);

            const dept = emp.dept || "Uncategorized";
            if (!deptCosts[dept]) deptCosts[dept] = 0;
            const pay = parseFloat(emp.salaryToBePaid) || 0;
            deptCosts[dept] += (pay > 0 ? pay : 0);

            if (emp.joiningDate && emp.joiningDate.trim() !== "") {
                newJoiners.push(emp);
            }
        });

        const expectedDays = db.length * activeConf.days;
        const attRate = expectedDays ? ((totalPresent / expectedDays) * 100).toFixed(1) : 0;
        const sortedDepts = Object.entries(deptCosts).sort((a,b) => b[1] - a[1]);

        const insights = [];
        if (attRate < 85 && db.length > 0) insights.push({ type: 'warning', icon: 'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z', color: 'text-amber-600', bg: 'bg-amber-50', border: 'border-amber-200', title: 'High Absenteeism Rate', msg: `Overall attendance is at ${attRate}%. Consider reviewing leave patterns or issues affecting the workforce.` });
        if (totalOTCost > (totalBasic * 0.15) && db.length > 0) insights.push({ type: 'error', icon: 'M13 7h8m0 0v8m0-8l-8 8-4-4-6 6', color: 'text-rose-600', bg: 'bg-rose-50', border: 'border-rose-200', title: 'Excessive Overtime Costs', msg: `OT accounts for >15% of basic payroll (₹${totalOTCost.toLocaleString(undefined, {maximumFractionDigits:0})}). Consider adjusting shift timings to reduce burnout.` });
        if (totalMissingPunches > (db.length * 1.5) && db.length > 0) insights.push({ type: 'info', icon: 'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9', color: 'text-sky-600', bg: 'bg-sky-50', border: 'border-sky-200', title: 'Frequent Missing Punches', msg: `Detected ${totalMissingPunches} missing punch-outs (P?). Enforce stricter punch rules.` });
        if (totalAdvance > (totalEarned * 0.2) && db.length > 0) insights.push({ type: 'warning', icon: 'M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z', color: 'text-orange-600', bg: 'bg-orange-50', border: 'border-orange-200', title: 'High Advance Dependency', msg: 'Employees have requested over 20% of their earned salaries as advance payments. Review loan policies.' });
        if (insights.length === 0 && db.length > 0) insights.push({ type: 'success', icon: 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z', color: 'text-emerald-600', bg: 'bg-emerald-50', border: 'border-emerald-200', title: 'System Healthy', msg: 'Payroll and attendance metrics are well within healthy operational thresholds. No critical actions required.' });

        const topAbsent = [...db].sort((a, b) => (parseFloat(b.absent)||0) - (parseFloat(a.absent)||0)).slice(0, 5).filter(e => e.absent > 0);
        const topOT = [...db].sort((a, b) => (parseFloat(b.otHrs)||0) - (parseFloat(a.otHrs)||0)).slice(0, 5).filter(e => e.otHrs > 0);

        return { totalBasic, totalPayout, totalAdvance, totalOTCost, totalOTHours, totalAbsent, attRate, sortedDepts, insights, topAbsent, topOT, newJoiners };
    }, [db, activeConf]);

    return (
        <div className="flex-1 overflow-y-auto p-8 hide-scroll bg-slate-50 flex flex-col gap-6">
            <div className="flex justify-between items-end mb-2">
                <div>
                    <h2 className="text-3xl font-black text-slate-900 tracking-tight">Executive Analytics</h2>
                    <p className="text-sm font-semibold text-slate-500 mt-1">Detailed financial and operational overview for {activeConf.label}.</p>
                </div>
                <div className="text-xs font-bold text-slate-400 bg-white px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm flex items-center gap-2">
                    <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    Live Data
                </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
                <div className="bg-white border-l-4 border-l-brand-500 border-y border-r border-slate-200 p-6 rounded-r-2xl shadow-sm flex flex-col justify-between group hover:shadow-md transition-all">
                    <div className="flex justify-between items-start mb-2">
                        <div className="w-10 h-10 rounded-xl bg-brand-50 text-brand-500 flex items-center justify-center group-hover:scale-110 transition duration-300"><Icon path="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></div>
                        <span className="text-[10px] font-black bg-brand-100 text-brand-700 px-2 py-0.5 rounded-md">PAYOUT</span>
                    </div>
                    <div>
                        <div className="text-3xl font-black text-slate-800 tracking-tight mb-1">₹{stats.totalPayout.toLocaleString(undefined, {maximumFractionDigits:0})}</div>
                        <p className="text-xs font-semibold text-slate-400">Net payable after deductions</p>
                    </div>
                </div>

                <div className="bg-white border-l-4 border-l-rose-500 border-y border-r border-slate-200 p-6 rounded-r-2xl shadow-sm flex flex-col justify-between group hover:shadow-md transition-all">
                    <div className="flex justify-between items-start mb-2">
                        <div className="w-10 h-10 rounded-xl bg-rose-50 text-rose-500 flex items-center justify-center group-hover:scale-110 transition duration-300"><Icon path="M2.25 18L9 11.25l4.306 4.307a11.95 11.95 0 015.814-5.519l2.74-1.22m0 0l-5.94-2.28m5.94 2.28l-2.28 5.941"/></div>
                        <span className="text-[10px] font-black bg-rose-100 text-rose-700 px-2 py-0.5 rounded-md">ADVANCE</span>
                    </div>
                    <div>
                        <div className="text-3xl font-black text-rose-600 tracking-tight mb-1">₹{stats.totalAdvance.toLocaleString(undefined, {maximumFractionDigits:0})}</div>
                        <p className="text-xs font-semibold text-slate-400">Total advances to deduct</p>
                    </div>
                </div>

                <div className="bg-white border-l-4 border-l-amber-500 border-y border-r border-slate-200 p-6 rounded-r-2xl shadow-sm flex flex-col justify-between group hover:shadow-md transition-all">
                    <div className="flex justify-between items-start mb-2">
                        <div className="w-10 h-10 rounded-xl bg-amber-50 text-amber-500 flex items-center justify-center group-hover:scale-110 transition duration-300"><Icon path="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></div>
                        <span className="text-[10px] font-black bg-amber-100 text-amber-700 px-2 py-0.5 rounded-md">O.T COST</span>
                    </div>
                    <div>
                        <div className="text-3xl font-black text-amber-600 tracking-tight mb-1">₹{stats.totalOTCost.toLocaleString(undefined, {maximumFractionDigits:0})}</div>
                        <p className="text-xs font-semibold text-slate-400">Across {stats.totalOTHours} total hours logged</p>
                    </div>
                </div>

                <div className="bg-white border-l-4 border-l-emerald-500 border-y border-r border-slate-200 p-6 rounded-r-2xl shadow-sm flex flex-col justify-between group hover:shadow-md transition-all">
                    <div className="flex justify-between items-start mb-2">
                        <div className="w-10 h-10 rounded-xl bg-emerald-50 text-emerald-500 flex items-center justify-center group-hover:scale-110 transition duration-300"><Icon path="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></div>
                        <span className="text-[10px] font-black bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-md">ATTENDANCE</span>
                    </div>
                    <div>
                        <div className="text-3xl font-black text-emerald-600 tracking-tight mb-1">{stats.attRate}%</div>
                        <p className="text-xs font-semibold text-slate-400">Overall operational strength</p>
                    </div>
                </div>
            </div>

            <div className="bg-white border border-slate-200 rounded-2xl shadow-sm p-6 relative overflow-hidden">
                <div className="absolute top-0 right-0 p-8 opacity-[0.03] pointer-events-none"><Icon path="M13 10V3L4 14h7v7l9-11h-7z" className="w-32 h-32"/></div>
                <h3 className="text-lg font-black text-slate-800 mb-5 flex items-center gap-2 relative z-10"><Icon path="M13 10V3L4 14h7v7l9-11h-7z" className="text-brand-500"/> System Insights & Recommendations</h3>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 relative z-10">
                    {stats.insights.length === 0 ? (
                        <div className="col-span-2 text-sm text-slate-400 font-medium p-4 text-center bg-slate-50 rounded-xl border border-dashed border-slate-300">Not enough data to generate insights yet.</div>
                    ) : stats.insights.map((ins, idx) => (
                        <div key={idx} className={`p-4 rounded-xl border-l-4 ${ins.bg} ${ins.border.replace('border-', 'border-l-').replace('border-200', '500')} border-y border-r border-slate-100 flex items-start gap-4 shadow-sm hover:-translate-y-0.5 transition-transform`}>
                            <div className={`mt-0.5 ${ins.color} bg-white p-2 rounded-lg shadow-sm`}><Icon path={ins.icon} className="w-5 h-5"/></div>
                            <div>
                                <h4 className={`text-sm font-black ${ins.color} mb-1 tracking-tight`}>{ins.title}</h4>
                                <p className={`text-xs font-bold text-slate-600 leading-relaxed`}>{ins.msg}</p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="bg-white border border-slate-200 rounded-2xl shadow-sm p-6 lg:col-span-1 flex flex-col">
                    <h3 className="text-xs font-black text-slate-400 mb-5 uppercase tracking-widest">Department Costs</h3>
                    <div className="space-y-5 flex-1">
                        {stats.sortedDepts.length === 0 ? <p className="text-xs text-slate-400 font-bold text-center mt-10">No data.</p> : stats.sortedDepts.map(([dept, cost], idx) => {
                            const max = stats.sortedDepts[0][1] || 1;
                            const pct = ((cost / max) * 100).toFixed(0);
                            return (
                                <div key={idx}>
                                    <div className="flex justify-between items-end text-xs font-bold mb-1.5">
                                        <span className="text-slate-700 truncate pr-2 uppercase tracking-wide">{dept}</span>
                                        <div className="text-right">
                                            <span className="text-slate-900 font-black">₹{cost.toLocaleString(undefined, {maximumFractionDigits:0})}</span>
                                        </div>
                                    </div>
                                    <div className="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden flex">
                                        <div className="bg-brand-500 h-2.5 rounded-full" style={{ width: `${pct}%` }}></div>
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                </div>

                <div className="bg-white border border-slate-200 rounded-2xl shadow-sm p-6 flex flex-col">
                    <div className="flex items-center justify-between mb-5">
                        <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">Top Absentees</h3>
                        <span className="text-[10px] font-black bg-rose-100 text-rose-600 px-2 py-0.5 rounded-md">CRITICAL</span>
                    </div>
                    <div className="space-y-3 flex-1">
                        {stats.topAbsent.length === 0 ? <p className="text-xs text-slate-400 font-bold text-center mt-10">No absentees logged.</p> : stats.topAbsent.map((e, idx) => (
                            <div key={idx} className="flex items-center justify-between p-3 bg-white border border-slate-100 shadow-sm rounded-xl hover:border-rose-200 transition">
                                <div className="flex items-center gap-3">
                                    <div className="w-8 h-8 rounded-full bg-rose-50 text-rose-600 flex items-center justify-center font-black text-xs border border-rose-100">{e.name.charAt(0)}</div>
                                    <div className="flex flex-col">
                                        <span className="text-xs font-black text-slate-800 truncate w-24 sm:w-32">{e.name}</span>
                                        <span className="text-[10px] font-bold text-slate-400">{e.dept}</span>
                                    </div>
                                </div>
                                <div className="text-right flex flex-col items-end">
                                    <span className="text-sm font-black text-rose-600">{e.absent} Days</span>
                                    <span className="text-[10px] font-bold text-slate-400">Loss: ₹{((parseFloat(e.absent)||0) * (parseFloat(e.perDaySalary)||0)).toLocaleString(undefined, {maximumFractionDigits:0})}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>

                <div className="bg-white border border-slate-200 rounded-2xl shadow-sm p-6 flex flex-col">
                    <div className="flex items-center justify-between mb-5">
                        <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">Highest OT Logged</h3>
                        <span className="text-[10px] font-black bg-brand-100 text-brand-600 px-2 py-0.5 rounded-md">REVIEW</span>
                    </div>
                    <div className="space-y-3 flex-1">

const App = () => {
const [auth, setAuth] = useState(() => {
    const savedPwd = localStorage.getItem(PWD_KEY);
    return { isLocked: true, hasPassword: !!savedPwd, password: savedPwd ? atob(savedPwd) : "" };
});
const [passInput, setPassInput] = useState("");

// Multi-Month DB Architecture
const [activeMonthKey, setActiveMonthKey] = useState(() => localStorage.getItem(MONTH_KEY) || MONTHS[0].id);

const [dbs, setDbs] = useState(() => {
    const loaded = {};
    MONTHS.forEach(m => {
        const saved = localStorage.getItem(m.dbKey);
        if (saved) { 
            try { loaded[m.id] = JSON.parse(saved).map(e => compute(e, m)); } 
            catch(e){ loaded[m.id] = []; } 
        } else {
            loaded[m.id] = [];
        }
    });
    return loaded;
});

const activeConf = useMemo(() => MONTHS.find(m => m.id === activeMonthKey), [activeMonthKey]);
const db = useMemo(() => dbs[activeMonthKey] || [], [dbs, activeMonthKey]);

// Effect hooks for persistence
useEffect(() => { localStorage.setItem(MONTH_KEY, activeMonthKey); }, [activeMonthKey]);
useEffect(() => { 
    MONTHS.forEach(m => {
        localStorage.setItem(m.dbKey, JSON.stringify(dbs[m.id]));
    });
}, [dbs]);

const setDb = useCallback((newDbOrFn) => {
    setDbs(prev => {
        const updated = typeof newDbOrFn === 'function' ? newDbOrFn(prev[activeMonthKey]) : newDbOrFn;
        return { ...prev, [activeMonthKey]: updated };
    });
}, [activeMonthKey]);

const [activeTab, useState] = React.useState("employees");
const [logDate, setLogDate] = React.useState(1);
const [selectedId, setSelectedId] = React.useState(null);
const [search, setSearch] = React.useState("");
const [focusDay, setFocusDay] = React.useState(null);
const [otModal, setOtModal] = React.useState({ show: false, day: null, val: "" });
const [commentModal, setCommentModal] = React.useState({ show: false, day: null, val: "" });
const [pdfModal, setPdfModal] = React.useState({ show: false, hideBasic: false }); 
const [timeModal, setTimeModal] = React.useState({ show: false, day: null, step: 'in', inVal: '', outVal: '', custom: '' });

const [pdfSigs, setPdfSigs] = React.useState(() => {
    const saved = localStorage.getItem(SIG_KEY);
    if (saved) return JSON.parse(saved);
    return { prep: "MR. ARPIT MISHRA", rech: "MR. AMIT SINGH", ver: "MR. KUNAL CHANCHAL", app: "MR. MS SIR" };
});

const [toast, setToast] = React.useState(null);
const fileRef = useRef(null);
const otInputRef = useRef(null);
const commentInputRef = useRef(null);

useEffect(() => { localStorage.setItem(SIG_KEY, JSON.stringify(pdfSigs)); }, [pdfSigs]); 
useEffect(() => { if (toast) { const t = setTimeout(() => setToast(null), 3000); return () => clearTimeout(t); } }, [toast]);
useEffect(() => { if (otModal.show && otInputRef.current) { otInputRef.current.focus(); otInputRef.current.select(); } }, [otModal.show]);
useEffect(() => { if (commentModal.show && commentInputRef.current) { commentInputRef.current.focus(); } }, [commentModal.show]);

useEffect(() => {
    const handleGlobalEsc = (e) => {
        if (e.key === 'Escape') {
            if (timeModal.show) { setTimeModal(prev => ({...prev, show: false})); return; }
            if (otModal.show) { setOtModal(prev => ({...prev, show: false})); return; }
            if (commentModal.show) { setCommentModal(prev => ({...prev, show: false})); return; }
            if (pdfModal.show) { setPdfModal(prev => ({...prev, show: false})); return; }
            if (activeTab !== 'employees') { setActiveTab('employees'); return; }
        }
    };
    window.addEventListener('keydown', handleGlobalEsc);
    return () => window.removeEventListener('keydown', handleGlobalEsc);
}, [otModal.show, commentModal.show, pdfModal.show, timeModal.show, activeTab]);

const notify = (msg, type="success") => setToast({ msg, type });

const handleLogin = (e) => {
    e.preventDefault();
    if (!auth.hasPassword) {
        if(!passInput) return notify("Password cannot be empty!", "error");
        localStorage.setItem(PWD_KEY, btoa(passInput));
        setAuth({ isLocked: false, hasPassword: true, password: passInput });
        setPassInput("");
        notify("Master password created successfully!", "success");
    } else {
        if (passInput === auth.password) {
            setAuth({ ...auth, isLocked: false });
            setPassInput("");
            notify("Unlocked successfully!", "success");
        } else {
            notify("Incorrect Password!", "error");
        }
    }
};

const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    Papa.parse(file, {
        complete: (res) => {
            try {
                const data = res.data;
                const parsed = [];
                for (let i = 0; i < data.length; i++) {
                    const row = data[i];
                    if (!row || row.length < 5) continue;
                    const n = String(row[1] || "").trim();
                    if (n && !["employee name", "department", "prepared by", "total due", "recheck by"].some(x => n.toLowerCase().includes(x))) {
                        const em = { id: Math.random().toString(36).substr(2, 9), srNo: String(row[0]||"").trim(), name: n, dept: String(row[2]||"").trim(), code: String(row[3]||"").trim() || `C-${i}`, type: String(row[4]||"").trim(), basicSalary: parseFloat(row[67]) || 0, previousBalance: parseFloat(row[80]) || 0, advance: parseFloat(row[82]) || 0, joiningDate: "" };
                        for (let d = 1; d <= activeConf.days; d++) { 
                            em[`d${d}`] = String(row[5+(d-1)*2]||"").trim(); 
                            em[`ot${d}`] = String(row[6+(d-1)*2]||"").trim(); 
                            em[`c${d}`] = "";
                            em[`in${d}`] = "";
                            em[`out${d}`] = "";
                        }
                        parsed.push(compute(em, activeConf));
                    }
                }
                if (parsed.length > 0) { setDb(parsed); notify(`Imported ${parsed.length} records into ${activeConf.label}`); } else notify("No valid data", "error");
            } catch (err) { notify("Parse error", "error"); }
            if (fileRef.current) fileRef.current.value = "";
        }
    });
};

const handleExportExcel = () => {
    if (db.length === 0) { notify("No data to export", "error"); return; }
    try {
        const wb = XLSX.utils.book_new();
        const CLR_YELLOW = { rgb: "FFD966" };
        const CLR_BLUE = { rgb: "8EA9DB" };
        const CLR_LIGHTGRAY = { rgb: "F2F2F2" };
        const BORDER_ALL = { top: { style: "thin" }, bottom: { style: "thin" }, left: { style: "thin" }, right: { style: "thin" } };

        const cell = (val, bg, bold, align = "center", isFormula = false) => {
            const style = { border: BORDER_ALL, alignment: { horizontal: align, vertical: "center" } };
            if (bg) style.fill = { fgColor: bg };
            if (bold) style.font = { bold: true };
            if (isFormula) return { f: val, s: style };
            return { v: val === undefined || val === null ? "" : val, t: typeof val === "number" ? "n" : "s", s: style };
        };

        const aoa = [];
        aoa.push([ { v: "Arise Construction Equipments", t: "s", s: { font: { bold: true, sz: 14 } } } ]);
        aoa.push([ { v: `Attendance Sheet - ${activeConf.label.toUpperCase()}`, t: "s", s: { font: { bold: true, sz: 12 } } } ]);

        const head1 = [
            cell("Sr. No.", CLR_LIGHTGRAY, true), cell("Employee Name", CLR_LIGHTGRAY, true, "left"),
            cell("DEPARTMENT", CLR_LIGHTGRAY, true), cell("CODE", CLR_BLUE, true), cell("TYPE", CLR_LIGHTGRAY, true)
        ];

        for (let i = 1; i <= activeConf.days; i++) {
            const isWk = activeConf.weekends.includes(i);
            head1.push(cell(String(i).padStart(2, '0'), isWk ? CLR_YELLOW : CLR_LIGHTGRAY, true));
            head1.push(cell("", isWk ? CLR_YELLOW : CLR_LIGHTGRAY, true)); 
        }

        const pHeaders = ["Basic Salary", "Present", "w/O", "T", "Working Days", "Absent Days", "O.T. HRS", "Total Working Days", "Per Day Salary", "Per HRS Salary", "Monthly Salary", "Daily OT Salary", "Actual Monthly Salary", "Previous Balance", "Salary After Previous", "Advance", "Salary To Be Paid", "Actual Salary Paid", "Balance Status"];
        pHeaders.forEach(ph => head1.push(cell(ph, ph.includes("Actual") || ph.includes("Salary To Be Paid") ? CLR_YELLOW : CLR_LIGHTGRAY, true)));
        aoa.push(head1);

        const head2 = [
            cell("", CLR_LIGHTGRAY, true), cell("", CLR_LIGHTGRAY, true), cell("", CLR_LIGHTGRAY, true), cell("", CLR_BLUE, true), cell("", CLR_LIGHTGRAY, true)
        ];
        
        for (let i = 1; i <= activeConf.days; i++) {
            const isWk = activeConf.weekends.includes(i);
            head2.push(cell(DAY_NAMES[(activeConf.startOffset + i - 1) % 7], isWk ? CLR_YELLOW : CLR_LIGHTGRAY, true));
            head2.push(cell("OT", isWk ? CLR_YELLOW : CLR_LIGHTGRAY, true)); 
        }
        pHeaders.forEach(ph => head2.push(cell("", ph.includes("Actual") || ph.includes("Salary To Be Paid") ? CLR_YELLOW : CLR_LIGHTGRAY, true)));
        aoa.push(head2);

        const getColName = (c) => {
            let colName = String.fromCharCode(65 + (c % 26));
            if (c >= 26) colName = String.fromCharCode(64 + Math.floor(c/26)) + colName;
            return colName;
        };
        const sunCols = activeConf.weekends.map(d => getColName(5 + (d-1)*2)); 

        const baseIdx = 5 + activeConf.days * 2;
        const colBasic = getColName(baseIdx);
        const colP = getColName(baseIdx + 1);
        const colWO = getColName(baseIdx + 2);
        const colT = getColName(baseIdx + 3);
        const colWkDays = getColName(baseIdx + 4);
        const colAbs = getColName(baseIdx + 5);
        const colOT = getColName(baseIdx + 6);
        const colTotDays = getColName(baseIdx + 7);
        const colPerDay = getColName(baseIdx + 8);
        const colPerHr = getColName(baseIdx + 9);
        const colMonSal = getColName(baseIdx + 10);
        const colOtSal = getColName(baseIdx + 11);
        const colActSal = getColName(baseIdx + 12);
        const colPrev = getColName(baseIdx + 13);
        const colSalPrev = getColName(baseIdx + 14);
        const colAdv = getColName(baseIdx + 15);
        const colSalPay = getColName(baseIdx + 16);

        const endAttColName = getColName(4 + activeConf.days * 2);

        db.forEach((emp, index) => {
            const R = index + 5; 
            const row = [
                cell(emp.srNo || index + 1, null, true), cell(emp.name, null, true, "left"), cell(emp.dept, null, false), cell(emp.code, null, true), cell(emp.type, null, false)
            ];

            for (let i = 1; i <= activeConf.days; i++) {
                const isWk = activeConf.weekends.includes(i);
                const bg = isWk ? CLR_YELLOW : null;
                const manual = String(emp[`d${i}`] || "").trim().toUpperCase();
                const aVal = manual || (emp.autoWoDays?.[i] || "");
                row.push(cell(aVal, bg, false));
                const otRaw = String(emp[`ot${i}`] || "").trim();
                const otVal = (otRaw !== "" && !isNaN(otRaw)) ? parseFloat(otRaw) : "";
                const otC = cell(otVal, bg, false);
                if (otVal !== "" && otVal < 0) otC.s.font = { color: { rgb: "FF0000" }, bold: true };
                else if (otVal !== "" && otVal > 0) otC.s.font = { color: { rgb: "0000FF" }, bold: true };
                row.push(otC);
            }

            const attRange = `F${R}:${endAttColName}${R}`;
            const extraWoFormula = sunCols.length ? sunCols.map(col => `IF(OR(${col}${R}="P", ${col}${R}="P?", ${col}${R}="H", ${col}${R}="0.5", ${col}${R}="T"), 1, 0)`).join("+") : "0";

            row.push(
                cell(parseFloat(emp.basicSalary) || 0, null, true),
                cell(`COUNTIF(${attRange},"P")+COUNTIF(${attRange},"P~?")+COUNTIF(${attRange},"H")*0.5+COUNTIF(${attRange},"0.5")*0.5`, null, true, "center", true),
                cell(`COUNTIF(${attRange},"W/O") + IF(UPPER(E${R})="E", ${extraWoFormula}, 0)`, null, false, "center", true),
                cell(`COUNTIF(${attRange},"T")`, null, false, "center", true),
                cell(`${colP}${R}+${colWO}${R}+${colT}${R}`, null, true, "center", true),
                cell(`COUNTIF(${attRange},"A")`, null, true, "center", true),
                cell(`SUMIF(F$4:${endAttColName}$4,"OT",F${R}:${endAttColName}${R})`, null, true, "center", true),
                cell(activeConf.days, null, false),
                cell(`IF(${colTotDays}${R}>0, ${colBasic}${R}/${colTotDays}${R}, 0)`, null, false, "center", true),
                cell(`IF(${colPerDay}${R}>0, ${colPerDay}${R}/8.5, 0)`, null, false, "center", true),
                cell(`ROUND(${colWkDays}${R}*${colPerDay}${R}, 0)`, null, false, "center", true),
                cell(`ROUND(${colOT}${R}*${colPerHr}${R}, 0)`, null, false, "center", true),
                cell(`ROUND(${colMonSal}${R}+${colOtSal}${R}, 0)`, CLR_YELLOW, true, "center", true),
                cell(parseFloat(emp.previousBalance) || 0, null, false),
                cell(`ROUND(${colActSal}${R}+${colPrev}${R}, 0)`, null, false, "center", true),
                cell(parseFloat(emp.advance) || 0, null, false),
                cell(`ROUND(${colSalPrev}${R}-${colAdv}${R}, 0)`, CLR_YELLOW, true, "center", true),
                cell("", null, false), cell("", null, false)
            );
            aoa.push(row);
        });

        const ws = XLSX.utils.aoa_to_sheet(aoa);
        const merges = [];
        for (let i = 0; i < 5; i++) merges.push({ s: { r: 2, c: i }, e: { r: 3, c: i } });
        let col = 5;
        for (let i = 1; i <= activeConf.days; i++) { merges.push({ s: { r: 2, c: col }, e: { r: 2, c: col + 1 } }); col += 2; }
        for (let i = col; i < col + pHeaders.length; i++) merges.push({ s: { r: 2, c: i }, e: { r: 3, c: i } });
        ws['!merges'] = merges;
        
        const cols = [{ wch: 6 }, { wch: 22 }, { wch: 14 }, { wch: 10 }, { wch: 6 }];
        for (let i = 0; i < activeConf.days; i++) { cols.push({ wch: 4.5 }); cols.push({ wch: 4.5 }); } 
        pHeaders.forEach(() => cols.push({ wch: 12 }));
        ws['!cols'] = cols;

        XLSX.utils.book_append_sheet(wb, ws, activeConf.short);
        XLSX.writeFile(wb, `Arise_Attendance_${activeConf.short}.xlsx`);
        notify("Formula-based Excel Exported!", "success");
    } catch(err) { notify("Failed to export Excel", "error"); console.error(err); }
};

                rIn.push(cell(inDisplay, bg, false, "center", null, BORDER_IN_ROW));
                rOut.push(cell(outDisplay, bg, false, "center", null, BORDER_OUT_ROW));
            }

            aoa.push(rIn);
            aoa.push(rOut);

            // Merge # and Name
            merges.push({ s: { r: rBase, c: 0 }, e: { r: rBase + 1, c: 0 } });
            merges.push({ s: { r: rBase, c: 1 }, e: { r: rBase + 1, c: 1 } });
        });

        const ws = XLSX.utils.aoa_to_sheet(aoa);
        ws['!merges'] = merges;
        
        // Column widths
        const cols = [{ wch: 5 }, { wch: 25 }];
        for (let i = 0; i < activeConf.days; i++) cols.push({ wch: 9 });
        ws['!cols'] = cols;
        
        // Row heights
        const rows = [{ hpt: 35 }, { hpt: 20 }, { hpt: 30 }, { hpt: 15 }];
        for(let i=0; i<db.length; i++){
            rows.push({ hpt: 18 }); // IN row
            rows.push({ hpt: 18 }); // OUT row
        }
        ws['!rows'] = rows;

        XLSX.utils.book_append_sheet(wb, ws, "IN_OUT_Log");
        XLSX.writeFile(wb, `Arise_IN_OUT_Check_${activeConf.short}.xlsx`);
        notify("IN/OUT Time Excel Exported!", "success");
    } catch(err) { notify("Failed to export Excel", "error"); console.error(err); }
};

const handleMigrateEmployees = () => {
    const otherMonthKey = MONTHS.find(m => m.id !== activeMonthKey).id;
    const oldDb = dbs[otherMonthKey];
    if (!oldDb || oldDb.length === 0) return notify("No employees exist in the other month yet.", "error");
    if (confirm(`Copy ${oldDb.length} employees from the other month into ${activeConf.label}? All their attendance logic will start fresh.`)) {
        const copied = oldDb.map(e => {
            const newE = { ...e };
            for(let i=1; i<=31; i++) { delete newE[`d${i}`]; delete newE[`ot${i}`]; delete newE[`c${i}`]; delete newE[`in${i}`]; delete newE[`out${i}`]; }
            for(let i=1; i<=activeConf.days; i++) { newE[`d${i}`] = ""; newE[`ot${i}`] = ""; newE[`c${i}`] = ""; newE[`in${i}`] = ""; newE[`out${i}`] = ""; }
            newE.previousBalance = 0; newE.advance = 0;
            return compute(newE, activeConf);
        });
        setDb(copied); notify("Workforce migrated successfully!", "success");
    }
};

useEffect(() => {
    const handleGlobalKey = (e) => {
        if (otModal.show || commentModal.show || pdfModal.show || timeModal.show) return;
        if (activeTab !== 'employees') return;
        if (!selectedId) return;
        
        const activeTag = document.activeElement.tagName;
        if (activeTag === 'INPUT' || activeTag === 'TEXTAREA') return;

        if (['ArrowUp', 'ArrowDown'].includes(e.key) && !focusDay) {
            const curIdx = filtered.findIndex(x => x.id === selectedId);
            if (e.key === 'ArrowDown' && curIdx < filtered.length - 1) { setSelectedId(filtered[curIdx+1].id); e.preventDefault(); return; }
            if (e.key === 'ArrowUp' && curIdx > 0) { setSelectedId(filtered[curIdx-1].id); e.preventDefault(); return; }
        }

        if (!focusDay) return;
        if (e.key === 'ArrowRight') { setFocusDay(prev => Math.min(activeConf.days, prev + 1)); e.preventDefault(); }
        if (e.key === 'ArrowLeft') { setFocusDay(prev => Math.max(1, prev - 1)); e.preventDefault(); }
        if (e.key === 'ArrowUp') { setFocusDay(prev => Math.max(1, prev - 7)); e.preventDefault(); }
        if (e.key === 'ArrowDown') { setFocusDay(prev => Math.min(activeConf.days, prev + 7)); e.preventDefault(); }

        const key = e.key.toLowerCase();
        
        // Mark Present & Trigger Time Bubble
        if (key === 'p') { 
            updateAtt(focusDay, 'P'); 
            setTimeModal({ show: true, day: focusDay, step: 'in', inVal: '', outVal: '', custom: '' });
            e.preventDefault(); 
        }
        
        // Other markings clear the in/out time
        if (['a', 'h', 't', 'w'].includes(key) || e.key === 'Backspace' || e.key === 'Delete') { 
            let val = '';
            if (key === 'a') val = 'A';
            if (key === 'h') val = 'H';
            if (key === 't') val = 'T';
            if (key === 'w') val = 'W/O';
            setDb(prev => prev.map(em => em.id === selectedId ? compute({ ...em, [`d${focusDay}`]: val, [`in${focusDay}`]: '', [`out${focusDay}`]: '' }, activeConf) : em));
            setFocusDay(prev => Math.min(activeConf.days, prev + 1)); 
            e.preventDefault();
        }
        
        if (key === 'm') {
            updateAtt(focusDay, 'P?');
            const em = db.find(x => x.id === selectedId);
            setCommentModal({ show: true, day: focusDay, val: em ? em[`c${focusDay}`] || "" : "" });
            e.preventDefault();
        }
        
        if (key === 'o' || e.key === 'Enter') { 
            const em = db.find(x => x.id === selectedId);
            setOtModal({ show: true, day: focusDay, val: em ? em[`ot${focusDay}`] : "" }); 
            e.preventDefault(); 
        }
        if (key === 'c') {
            const em = db.find(x => x.id === selectedId);
            setCommentModal({ show: true, day: focusDay, val: em ? em[`c${focusDay}`] || "" : "" });
            e.preventDefault();
        }
    };
    window.addEventListener('keydown', handleGlobalKey);
    return () => window.removeEventListener('keydown', handleGlobalKey);
}, [selectedId, focusDay, db, otModal.show, commentModal.show, pdfModal.show, timeModal.show, updateAtt, activeTab, activeConf.days]);

                {Array.from({ length: activeConf.startOffset }).map((_, i) => <div key={`empty-${i}`} className="opacity-0"></div>)}
                {Array.from({ length: activeConf.days }, (_, i) => {
                    const dNum = i + 1;
                    const isWk = activeConf.weekends.includes(dNum);
                    const manualVal = activeEmp[`d${dNum}`];
                    const autoWoVal = !manualVal && activeEmp.autoWoDays?.[dNum] === "W/O" ? "W/O" : "";
                    const aVal = manualVal ? String(manualVal).toUpperCase() : autoWoVal;
                    const isAutoWo = !manualVal && autoWoVal === "W/O";
                    const isE = String(activeEmp.type || "").trim().toUpperCase() === "E";
                    const getsExtraWo = isWk && isE && manualVal && ['P', 'P?', 'H', '0.5', 'T'].includes(String(manualVal).toUpperCase());
                    const oVal = activeEmp[`ot${dNum}`];
                    const cVal = activeEmp[`c${dNum}`];
                    const inVal = activeEmp[`in${dNum}`];
                    const outVal = activeEmp[`out${dNum}`];
                    const cColor = getAttColor(aVal);

                    return (
                        <div id={`day-${dNum}`} key={dNum} tabIndex={0} onClick={() => setFocusDay(dNum)} className={`day-card relative h-28 rounded-2xl border-2 cursor-pointer flex flex-col p-2 bg-white ${focusDay === dNum ? 'border-brand-500 shadow-md ring-4 ring-brand-500/20' : 'border-slate-200 hover:border-slate-300'} ${isWk && !aVal ? 'bg-amber-50' : ''}`}>
                            <span className={`absolute top-2 left-3 text-sm font-black ${isWk ? 'text-amber-500' : 'text-slate-400'}`}>{dNum}</span>
                            {cVal && (
                                <div className="absolute top-2 right-2 text-brand-500 bg-brand-50 hover:bg-brand-100 transition p-1 rounded-md z-20 cursor-pointer shadow-sm" title={cVal} onClick={(e) => { e.stopPropagation(); setFocusDay(dNum); setCommentModal({ show: true, day: dNum, val: cVal }); }}>
                                    <Icon path="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z" className="w-3.5 h-3.5"/>
                                </div>
                            )}
                            
                            <div className="flex-1 flex flex-col items-center justify-center mt-3 gap-1">
                                <div className="flex items-center gap-2">
                                    <div className={`w-8 h-8 rounded-lg flex items-center justify-center font-black text-sm border-2 ${cColor} ${isAutoWo ? 'opacity-70 border-dashed bg-transparent text-purple-500 border-purple-400' : ''}`}>{aVal || '-'}</div>
                                    {oVal && <div className={`px-1.5 py-0.5 rounded border text-[10px] font-black ${parseFloat(oVal) < 0 ? 'bg-rose-100 text-rose-700 border-rose-200' : 'bg-brand-100 text-brand-700 border-brand-200'}`}>{oVal}h</div>}
                                </div>
                                
                                {(inVal || outVal) && (
                                    <div className="text-[9px] font-bold text-slate-500 mt-1 leading-tight text-center">
                                        {inVal && <div className="text-emerald-600">↑ {inVal}</div>}
                                        {outVal && <div className="text-rose-600">↓ {outVal}</div>}
                                    </div>
                                )}
                            </div>
                            {getsExtraWo && <div className="absolute bottom-1 left-0 right-0 flex justify-center"><span className="text-[8px] font-black uppercase text-purple-500 bg-purple-50 px-1 rounded-sm">+ W/O</span></div>}
                        </div>
                    );
                })}
            </div>
        </div>
    </div>
)}
</div>

{/* TIME SELECTION MODAL (BUBBLE) */}
{timeModal.show && (
    <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay">
        <div className="bg-white rounded-2xl shadow-2xl p-6 w-[600px] transform transition-all scale-100 relative overflow-hidden">
            <button onClick={() => setTimeModal({...timeModal, show: false})} className="absolute top-4 right-4 p-1 rounded hover:bg-slate-100 text-slate-400 transition">
                <Icon path="M6 18L18 6M6 6l12 12" className="w-6 h-6"/>
            </button>
            
            <div className="mb-6 flex items-center justify-between pr-8 border-b border-slate-100 pb-4">
                <div>
                    <h3 className={`text-2xl font-black tracking-tight flex items-center gap-2 ${timeModal.step === 'in' ? 'text-emerald-600' : 'text-rose-600'}`}>
                        {timeModal.step === 'in' ? <Icon path="M5 10l7-7m0 0l7 7m-7-7v18" className="w-6 h-6"/> : <Icon path="M19 14l-7 7m0 0l-7-7m7 7V3" className="w-6 h-6"/>}
                        {timeModal.step === 'in' ? 'Select Clock IN Time' : 'Select Clock OUT Time'}
                    </h3>
                    <p className="text-xs font-bold text-slate-500 mt-1 uppercase tracking-widest">{activeEmp?.name} • Day {timeModal.day}</p>
                </div>
            </div>

            {/* Quick Suggestions Row */}
            <div className="mb-5">
                <h4 className="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Common {timeModal.step === 'in' ? 'IN' : 'OUT'} Times</h4>
                <div className="grid grid-cols-4 gap-3">
                    {(timeModal.step === 'in' ? SUGGESTED_IN_TIMES : SUGGESTED_OUT_TIMES).map((timeStr, idx) => (
                        <button 
                            key={idx} 
                            onClick={() => handleTimeSelect(timeStr)}
                            className={`py-3 rounded-xl font-black text-sm transition-all border-2 shadow-sm ${
                                timeModal.step === 'in' 
                                ? 'bg-emerald-100 border-emerald-300 text-emerald-800 hover:bg-emerald-500 hover:text-white hover:border-emerald-500' 
                                : 'bg-rose-100 border-rose-300 text-rose-800 hover:bg-rose-500 hover:text-white hover:border-rose-500'
                            }`}
                        >
                            {timeStr}
                        </button>
                    ))}
                </div>
            </div>

            <h4 className="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest border-t border-slate-100 pt-4">All Time Options</h4>
            <div className="grid grid-cols-5 gap-2 max-h-56 overflow-y-auto p-1 mb-4 time-grid">
                {(timeModal.step === 'in' ? inTimeOptions : outTimeOptions).map((timeStr, idx) => (
                    <button 
                        key={idx} 
                        onClick={() => handleTimeSelect(timeStr)}
                        className={`text-xs py-2.5 rounded-lg border transition-all ${getTimeBtnClass(timeStr, timeModal.step)}`}
                    >
                        {timeStr}
                    </button>
                ))}
            </div>

            <div className="flex items-center gap-3 border-t border-slate-100 pt-4 bg-slate-50 -mx-6 -mb-6 px-6 pb-6">
                <div className="flex-1">
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Or Enter Custom Minutes</p>
                    <input 
                        type="time" 
                        value={timeModal.custom}
                        onChange={(e) => setTimeModal({...timeModal, custom: e.target.value})}
                        className={`w-full bg-white border-2 rounded-lg px-4 py-3 text-sm font-black text-slate-700 outline-none transition shadow-sm ${timeModal.step === 'in' ? 'focus:border-emerald-500' : 'focus:border-rose-500'}`}
                    />
                </div>
                <button 
                    onClick={handleTimeCustomSave} 
                    className={`self-end font-black text-sm px-6 py-3 rounded-lg shadow-lg transition text-white ${timeModal.step === 'in' ? 'bg-emerald-600 hover:bg-emerald-700 shadow-emerald-500/30' : 'bg-rose-600 hover:bg-rose-700 shadow-rose-500/30'}`}
                >
                    Save Custom
                </button>
            </div>
            
            <button onClick={() => setTimeModal({...timeModal, show: false})} className="absolute bottom-6 right-6 text-xs font-bold text-slate-400 hover:text-slate-600 hover:underline">Skip Time Selection</button>
        </div>
    </div>
)}

{/* OTHER MODALS */}
{pdfModal.show && (
    <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay">
        <div className="bg-white rounded-2xl shadow-2xl p-6 w-[450px] transform transition-all scale-100">
            <h3 className="text-xl font-black text-slate-800 mb-4 flex items-center gap-2 border-b border-slate-100 pb-3">
                <Icon path="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" className="text-rose-500"/> 
                Configure Verification Print
            </h3>
            
            <div className="mb-5 bg-slate-50 border border-slate-200 p-4 rounded-xl">
                <label className="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" checked={pdfModal.hideBasic} onChange={e => setPdfModal({...pdfModal, hideBasic: e.target.checked})} className="w-5 h-5 rounded border-slate-300 text-brand-600 focus:ring-brand-500" />
                    <div>
                        <div className="text-sm font-bold text-slate-800">Hide Basic Salary</div>
                        <div className="text-[10px] font-bold text-slate-400 mt-0.5">Omit base pay column from the PDF print</div>
                    </div>
                </label>
            </div>

            <div className="mb-6">
                <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2"><Icon path="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" className="w-3.5 h-3.5"/> Signature Authorities</h4>
                <div className="grid grid-cols-2 gap-x-4 gap-y-3">
                    <div>
                        <label className="text-[10px] font-bold text-slate-500 block mb-1">Prepared By</label>
                        <input type="text" value={pdfSigs.prep} onChange={e => setPdfSigs({...pdfSigs, prep: e.target.value.toUpperCase()})} className="w-full text-xs font-bold text-slate-800 p-2 border border-slate-200 rounded outline-none focus:border-brand-500 uppercase"/>
                    </div>
                    <div>
                        <label className="text-[10px] font-bold text-slate-500 block mb-1">Rechecked By</label>
                        <input type="text" value={pdfSigs.rech} onChange={e => setPdfSigs({...pdfSigs, rech: e.target.value.toUpperCase()})} className="w-full text-xs font-bold text-slate-800 p-2 border border-slate-200 rounded outline-none focus:border-brand-500 uppercase"/>
                    </div>
                    <div>
                        <label className="text-[10px] font-bold text-slate-500 block mb-1">Verified By</label>
                        <input type="text" value={pdfSigs.ver} onChange={e => setPdfSigs({...pdfSigs, ver: e.target.value.toUpperCase()})} className="w-full text-xs font-bold text-slate-800 p-2 border border-slate-200 rounded outline-none focus:border-brand-500 uppercase"/>
                    </div>
                    <div>
                        <label className="text-[10px] font-bold text-slate-500 block mb-1">Final Approval</label>
                        <input type="text" value={pdfSigs.app} onChange={e => setPdfSigs({...pdfSigs, app: e.target.value.toUpperCase()})} className="w-full text-xs font-bold text-slate-800 p-2 border border-slate-200 rounded outline-none focus:border-brand-500 uppercase"/>
                    </div>
                </div>
            </div>

            <div className="flex gap-2 justify-end pt-2">
                <button onClick={() => setPdfModal({...pdfModal, show:false})} className="px-4 py-2 rounded-lg font-bold text-slate-500 hover:bg-slate-100 transition">Cancel</button>
                <button onClick={executePDFExport} className="px-6 py-2 rounded-lg font-bold text-white bg-rose-600 hover:bg-rose-700 shadow-lg shadow-rose-500/30 transition flex items-center gap-2"><Icon path="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" className="w-4 h-4"/> Generate PDF</button>
            </div>
        </div>
    </div>
)}

{otModal.show && (
    <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay">
        <div className="bg-white rounded-2xl shadow-2xl p-6 w-80 transform transition-all scale-100">
            <h3 className="text-lg font-black text-slate-800 mb-4 flex items-center gap-2"><Icon path="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" className="text-brand-500"/> Day {otModal.day} Overtime/Penalty</h3>
            <div className="mb-6">
                <input type="number" step="0.5" ref={otInputRef} value={otModal.val} onChange={e => setOtModal({...otModal, val: e.target.value})} onKeyDown={e => { if(e.key === 'Enter') updateOt(otModal.day, otModal.val); }} className="w-full text-center text-4xl font-black text-slate-800 bg-slate-50 border-2 border-slate-200 rounded-xl py-4 outline-none focus:border-brand-500 focus:bg-white transition" placeholder="0.0" />
                <p className="text-center text-xs font-bold text-slate-400 mt-2">Use negative (-) for penalty</p>
            </div>
            <div className="flex gap-2 justify-end">
                <button onClick={() => setOtModal({...otModal, show:false})} className="px-4 py-2 rounded-lg font-bold text-slate-500 hover:bg-slate-100 transition">Cancel</button>
                <button onClick={() => updateOt(otModal.day, otModal.val)} className="px-6 py-2 rounded-lg font-bold text-white bg-brand-600 hover:bg-brand-700 shadow-lg shadow-brand-500/30 transition">Save OT</button>
            </div>
        </div>
    </div>
)}

{commentModal.show && (
    <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay">
        <div className="bg-white rounded-2xl shadow-2xl p-6 w-96 transform transition-all scale-100">
            <h3 className="text-lg font-black text-slate-800 mb-4 flex items-center gap-2"><Icon path="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z" className="text-brand-500"/> Date Comment - Day {commentModal.day}</h3>
            <div className="mb-6">
                <textarea ref={commentInputRef} value={commentModal.val} onChange={e => setCommentModal({...commentModal, val: e.target.value})} className="w-full text-sm font-medium text-slate-800 bg-slate-50 border-2 border-slate-200 rounded-xl p-4 outline-none focus:border-brand-500 focus:bg-white transition resize-none h-32" placeholder="Add a comment about this day (e.g. Missing punch time, Late by 1 hr, etc...)" />
            </div>
            <div className="flex gap-2 justify-end">
                <button onClick={() => setCommentModal({...commentModal, show:false})} className="px-4 py-2 rounded-lg font-bold text-slate-500 hover:bg-slate-100 transition">Cancel</button>
                <button onClick={() => updateComment(commentModal.day, commentModal.val)} className="px-6 py-2 rounded-lg font-bold text-white bg-brand-600 hover:bg-brand-700 shadow-lg shadow-brand-500/30 transition">Save Note</button>
            </div>
        </div>
    </div>
)}

{toast && (
    <div className="fixed bottom-6 right-6 z-50">
        <div className={`px-6 py-4 rounded-xl shadow-2xl font-bold flex items-center gap-3 text-white ${toast.type === 'error' ? 'bg-rose-500' : 'bg-slate-800'}`}>
            <Icon path={toast.type==='error'?"M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z":"M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"} />
            {toast.msg}
        </div>
    </div>
)}

</div>
);
};

const r = ReactDOM.createRoot(document.getElementById('root'));
r.render(<App />);
</script>
</body>
</html>
