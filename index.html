<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const PWD_KEY = 'arise_sys_pwd';
const SIG_KEY = 'arise_pdf_signatures'; 
const MONTH_KEY = 'arise_active_month_v6';

const MONTHS = [
    { id: 'MAY_2026', label: 'May 2026', short: 'MAY-26', days: 31, weekends: [3, 10, 17, 24, 31], startOffset: 4, dbKey: 'arise_modern_db_v5' },
    { id: 'JUN_2026', label: 'June 2026', short: 'JUN-26', days: 30, weekends: [7, 14, 21, 28], startOffset: 0, dbKey: 'arise_modern_db_jun_26' }
];

const DAY_NAMES = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

const formatDate = (dStr) => {
    if(!dStr) return "";
    const pts = dStr.split('-');
    if(pts.length === 3) return `${pts[2]}/${pts[1]}/${pts[0]}`;
    return dStr;
};

const generateTimeOptions = (startHr, startMin, endHr, endMin) => {
    const times = [];
    let h = startHr, m = startMin;
    while (h < endHr || (h === endHr && m <= endMin)) {
        const ampm = h >= 12 ? 'PM' : 'AM';
        const displayH = h > 12 ? h - 12 : (h === 0 ? 12 : h);
        const displayM = m.toString().padStart(2, '0');
        times.push(`${displayH}:${displayM} ${ampm}`);
        m += 5;
        if (m >= 60) { m -= 60; h++; }
    }
    return times;
};
const inTimeOptions = generateTimeOptions(8, 30, 11, 0); 
const outTimeOptions = generateTimeOptions(16, 0, 21, 0); 

const SUGGESTED_IN_TIMES = ['9:00 AM', '9:30 AM', '10:00 AM', '10:30 AM'];
const SUGGESTED_OUT_TIMES = ['5:30 PM', '6:00 PM', '6:30 PM', '7:00 PM'];

const formatTimeInput = (time24) => {
    if(!time24) return "";
    let [h, m] = time24.split(':');
    h = parseInt(h, 10);
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${h}:${m} ${ampm}`;
};

const compute = (emp, monthConf) => {
    let pr = 0, pOnly = 0, ab = 0, ot = 0, t = 0, wo = 0, h = 0, pMiss = 0;
    let autoWoDays = {};
    const isE = String(emp.type || "").trim().toUpperCase() === "E";
    const { days, weekends } = monthConf;

    for (let w of weekends) {
        if (!emp[`d${w}`]) {
            let sum = 0;
            for (let i = Math.max(1, w - 6); i < w; i++) {
                const a = String(emp[`d${i}`] || "").trim().toUpperCase();
                if (a === 'P' || a === 'P?' || a === 'T' || a === 'W/O') sum += 1;
                if (a === '0.5' || a === 'H') sum += 0.5;
            }
            if (sum >= 4) autoWoDays[w] = "W/O";
        }
    }

    for (let i = 1; i <= days; i++) {
        const manual = String(emp[`d${i}`] || "").trim().toUpperCase();
        const a = manual || autoWoDays[i] || "";
        const isSunday = weekends.includes(i);
        const o = String(emp[`ot${i}`] || "").trim();

        let getsExtraWo = false;
        if (isE && isSunday && manual && ['P', 'P?', 'H', '0.5', 'T'].includes(manual)) getsExtraWo = true;

        if (a === "P") { pr += 1; pOnly += 1; }
        else if (a === "P?") { pr += 1; pOnly += 1; pMiss += 1; } 
        else if (a === "T") { pr += 1; t += 1; }
        else if (a === "W/O") { pr += 1; wo += 1; }
        else if (a === "0.5" || a === "H") { pr += 0.5; h += 1; }
        else if (a === "A") ab += 1;

        if (getsExtraWo) { pr += 1; wo += 1; }
        if (o && !isNaN(parseFloat(o))) ot += parseFloat(o);
    }

    const bas = parseFloat(emp.basicSalary) || 0;
    const pBal = parseFloat(emp.previousBalance) || 0;
    const adv = parseFloat(emp.advance) || 0;
    const pd = bas > 0 ? bas / days : 0;
    const ph = pd > 0 ? pd / 8.5 : 0;
    
    const ms = Math.round(pr * pd);
    const dos = Math.round(ot * ph);
    const act = ms + dos;
    const bal = act + pBal;
    const pay = bal - adv;

    return { 
        ...emp, 
        present: pr, pOnly, absent: ab, otHrs: ot, tour: t, wo, half: h, pMiss, autoWoDays, 
        workingDays: pr, perDaySalary: pd, perHrSalary: ph, monthlySalary: ms, 
        dailyOtSalary: dos, actualMonthly: act, balance: bal, salaryToBePaid: pay,
        joiningDate: emp.joiningDate || ""
    };
};

const defaultEmp = (monthConf) => {
    const e = { id: Date.now().toString(), name: "New Employee", dept: "PRODUCTION", code: `EMP-${Math.floor(Math.random()*1000)}`, type: "E", basicSalary: 0, previousBalance: 0, advance: 0, joiningDate: "" };
    for (let i = 1; i <= monthConf.days; i++) { e[`d${i}`] = ""; e[`ot${i}`] = ""; e[`c${i}`] = ""; e[`in${i}`] = ""; e[`out${i}`] = ""; }
    return compute(e, monthConf);
};

const Icon = ({ path, className="w-5 h-5" }) => (
<svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style={{ width: '1.25rem', height: '1.25rem' }}>
<path strokeLinecap="round" strokeLinejoin="round" d={path}></path>
</svg>
);

const SystemSettings = ({ db, setDb, activeConf, notify }) => {
    const [snapshots, setSnapshots] = useState(() => {
        try { return JSON.parse(localStorage.getItem('arise_snapshots_v2') || '[]'); } catch(e) { return []; }
    });
    const [orphanKeys, setOrphanKeys] = useState([]);
    const fileRef = useRef(null);

    useEffect(() => {
        const orphans = [];
        const activeKeys = MONTHS.map(m => m.dbKey);
        for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (k && k.startsWith('arise_') && k.includes('_db_') && !activeKeys.includes(k)) {
                try { orphans.push({ key: k, size: (localStorage.getItem(k) || '').length }); } catch(e) {}
            }
        }
        setOrphanKeys(orphans);
    }, []);

    const saveSnapshot = () => {
        const now = new Date();
        const dateStr = now.toLocaleDateString('en-GB').replace(/\//g, '-');
        const timeStr = now.toLocaleTimeString('en-US', {hour12: false}).replace(/:/g, '-');
        const name = `Backup_${dateStr}_${timeStr}`;
        
        const newSnap = { id: Date.now().toString(), name, monthLabel: activeConf.label, date: now.toISOString(), data: JSON.stringify(db) };
        const updated = [newSnap, ...snapshots];
        setSnapshots(updated);
        try { localStorage.setItem('arise_snapshots_v2', JSON.stringify(updated)); } 
        catch(e) { notify("Storage limit reached! Please delete old caches.", "error"); return; }
        notify(`Saved current data as ${name}`, "success");
    };

    const deleteSnapshot = (id) => {
        if(!confirm("Delete this backup permanently?")) return;
        const updated = snapshots.filter(s => s.id !== id);
        setSnapshots(updated);
        localStorage.setItem('arise_snapshots_v2', JSON.stringify(updated));
        notify("Backup deleted", "success");
    };

    const exportSnapshot = (snap) => {
        const blob = new Blob([snap.data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${snap.name}.json`;
        a.click();
        notify("Exported successfully!", "success");
    };

    const restoreSnapshot = (snap) => {
        if(!confirm(`OVERWRITE current ${activeConf.label} data with ${snap.name}?`)) return;
        try {
            const parsed = JSON.parse(snap.data).map(e => compute(e, activeConf));
            setDb(parsed);
            notify("Backup restored successfully!", "success");
        } catch(e) { notify("Failed to restore backup", "error"); }
    };

    const exportOrphan = (okey) => {
        const data = localStorage.getItem(okey) || "[]";
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const now = new Date();
        const dateStr = now.toLocaleDateString('en-GB').replace(/\//g, '-');
        a.download = `${okey}_${dateStr}.json`;
        a.click();
    };

    const restoreOrphan = (okey) => {
        if(!confirm(`OVERWRITE current ${activeConf.label} data with old cache from ${okey}?`)) return;
        try {
            const data = localStorage.getItem(okey) || "[]";
            const parsed = JSON.parse(data).map(e => compute(e, activeConf));
            setDb(parsed);
            notify("Cache data restored successfully!", "success");
        } catch(e) { notify("Failed to load cache data", "error"); }
    };

    const deleteOrphan = (okey) => {
        if(!confirm(`Permanently delete cache ${okey}?`)) return;
        localStorage.removeItem(okey);
        setOrphanKeys(orphanKeys.filter(o => o.key !== okey));
        notify("Old cache cleared", "success");
    };

    const handleImportFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const parsed = JSON.parse(ev.target.result).map(emp => compute(emp, activeConf));
                if (confirm(`Load this file into ${activeConf.label}?`)) {
                    setDb(parsed);
                    notify("Loaded from file successfully!", "success");
                }
            } catch(err) { notify("Invalid JSON backup file format.", "error"); }
            if (fileRef.current) fileRef.current.value = "";
        };
        reader.readAsText(file);
    };

    return (
        <div className="flex-grow-1 overflow-y-auto p-4 hide-scroll bg-slate-50 d-flex flex-column gap-4">
            <div>
                <h2 className="h3 font-black text-slate-900 tracking-tight m-0">System Settings & Cache Management</h2>
                <p className="small text-muted font-semibold mt-1">Manage backups, retrieve old cache files, and secure your memory data.</p>
            </div>

            <div className="row g-4">
                <div className="col-12 col-lg-6">
                    <div className="card h-100 p-4 shadow-sm border-0 bg-white">
                        <div className="d-flex align-items-center gap-3 mb-4">
                            <div className="p-3 rounded-3 bg-brand-50 text-brand-600 d-flex align-items-center justify-content-center">
                                <Icon path="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                            </div>
                            <div>
                                <h3 className="h5 font-black text-slate-800 m-0">Current Data Backup</h3>
                                <p className="small text-muted m-0">Save your active month data instantly.</p>
                            </div>
                        </div>
                        <button onClick={saveSnapshot} className="btn btn-primary font-black py-3 w-100 shadow-sm">
                            Save Current State as Snapshot
                        </button>
                        
                        <div className="mt-4 pt-3 border-top border-slate-100">
                            <h4 className="fs-8 font-black text-slate-400 text-uppercase tracking-widest mb-3">Import Backups From File</h4>
                            <input type="file" accept=".json" onChange={handleImportFile} ref={fileRef} className="d-none" />
                            <button onClick={() => fileRef.current?.click()} className="btn btn-outline-secondary py-3 w-100 border-dashed d-flex align-items-center justify-content-center gap-2">
                                <Icon path="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /> 
                                Select Backup .JSON File to Restore
                            </button>
                        </div>
                    </div>
                </div>

                <div className="col-12 col-lg-6">
                    <div className="card h-100 p-4 shadow-sm border-0 bg-white d-flex flex-column">
                        <div className="d-flex align-items-center justify-content-between mb-4">
                            <div className="d-flex align-items-center gap-3">
                                <div className="p-3 rounded-3 bg-warning bg-opacity-10 text-warning d-flex align-items-center justify-content-center">
                                    <Icon path="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" />
                                </div>
                                <div>
                                    <h3 className="h5 font-black text-slate-800 m-0">Old Cache / DB Files</h3>
                                    <p className="small text-muted m-0">Found {orphanKeys.length} legacy databases memory.</p>
                                </div>
                            </div>
                        </div>
                        <div className="flex-grow-1 overflow-y-auto pr-2 hide-scroll" style={{ maxHeight: '250px' }}>
                            {orphanKeys.length === 0 ? (
                                <p className="small text-muted text-center py-4 border border-dashed border-slate-100 rounded-3">No old cache files found.</p>
                            ) : orphanKeys.map(ok => (
                                <div key={ok.key} className="p-3 border border-slate-100 rounded-3 bg-slate-50 mb-2">
                                    <div className="d-flex justify-content-between align-items-center mb-2">
                                        <span className="fs-7 font-black text-slate-700 text-truncate" style={{ maxWidth: '180px' }} title={ok.key}>{ok.key}</span>
                                        <span className="fs-8 font-black text-slate-400 bg-white px-2 py-0.5 rounded shadow-sm border">{(ok.size / 1024).toFixed(1)} KB</span>
                                    </div>
                                    <div className="d-flex gap-2">
                                        <button onClick={() => restoreOrphan(ok.key)} className="btn btn-sm btn-white border flex-grow-1 text-brand-600 font-bold">Select / View</button>
                                        <button onClick={() => exportOrphan(ok.key)} className="btn btn-sm btn-white border flex-grow-1 text-success font-bold">Export File</button>
                                        <button onClick={() => deleteOrphan(ok.key)} className="btn btn-sm btn-white border text-danger px-3"><Icon path="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>

            <div className="card p-4 shadow-sm border-0 bg-white d-flex flex-column flex-grow-1">
                <h3 className="h5 font-black text-slate-800 mb-4 d-flex align-items-center gap-2">
                    <Icon path="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" className="text-brand-500"/> In-App Saved Snapshots
                </h3>
                
                {snapshots.length === 0 ? (
                    <div className="text-center py-5 bg-slate-50 rounded-3 border border-dashed flex-grow-1 d-flex flex-column align-items-center justify-content-center">
                        <p className="small text-muted font-bold m-0">No backups saved yet.</p>
                        <p className="fs-7 text-muted font-semibold mt-1">Use the "Save Current State as Snapshot" button to create one.</p>
                    </div>
                ) : (
                    <div className="table-responsive flex-grow-1 border border-slate-100 rounded-3">
                        <table className="table table-hover align-middle m-0 text-left">
                            <thead className="table-light fs-8 text-uppercase tracking-wider text-slate-500">
                                <tr>
                                    <th className="p-3 font-black">Backup File Name</th>
                                    <th className="p-3 font-black">Month Config</th>
                                    <th className="p-3 font-black">Date & Time</th>
                                    <th className="p-3 font-black text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody className="fs-7 text-slate-700">
                                {snapshots.map(snap => {
                                    const d = new Date(snap.date);
                                    return (
                                        <tr key={snap.id}>
                                            <td className="p-3 font-bold text-slate-800">
                                                <div className="d-flex align-items-center gap-2">
                                                    <Icon path="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" className="text-brand-500" />
                                                    {snap.name}
                                                </div>
                                            </td>
                                            <td className="p-3"><span className="bg-light px-2 py-1 rounded fs-8 font-black border">{snap.monthLabel || "Unknown"}</span></td>
                                            <td className="p-3 font-bold text-slate-600">{d.toLocaleDateString()} {d.toLocaleTimeString()}</td>
                                            <td className="p-3 text-end">
                                                <div className="d-flex gap-2 justify-content-end">
                                                    <button onClick={() => restoreSnapshot(snap)} className="btn btn-sm btn-light text-brand-600 font-bold border">Select / Restore</button>
                                                    <button onClick={() => exportSnapshot(snap)} className="btn btn-sm btn-light text-success font-bold border">Export File</button>
                                                    <button onClick={() => deleteSnapshot(snap.id)} className="btn btn-sm btn-light text-danger border" title="Delete"><Icon path="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></button>
                                                </div>
                                            </td>
                                        </tr>
                                    )
                                })}
                            </tbody>
                        </table>
                    </div>
                )}
            </div>
        </div>
    );
};

const OwnerDashboard = ({ db, activeConf }) => {
    const stats = useMemo(() => {
        let totalBasic = 0, totalEarned = 0, totalPayout = 0, totalAdvance = 0, totalOTCost = 0, totalOTHours = 0;
        let totalAbsent = 0, totalPresent = 0, totalMissingPunches = 0;
        const deptCosts = {};
        const newJoiners = [];

        db.forEach(emp => {
            totalBasic += (parseFloat(emp.basicSalary) || 0);
            totalEarned += (parseFloat(emp.actualMonthly) || 0);
            totalPayout += Math.max(0, parseFloat(emp.salaryToBePaid) || 0); 
            totalAdvance += (parseFloat(emp.advance) || 0);
            totalOTCost += (parseFloat(emp.dailyOtSalary) || 0);
            totalOTHours += (parseFloat(emp.otHrs) || 0);
            totalAbsent += (parseFloat(emp.absent) || 0);
            totalPresent += (parseFloat(emp.workingDays) || 0);
            totalMissingPunches += (parseFloat(emp.pMiss) || 0);

            const dept = emp.dept || "Uncategorized";
            if (!deptCosts[dept]) deptCosts[dept] = 0;
            const pay = parseFloat(emp.salaryToBePaid) || 0;
            deptCosts[dept] += (pay > 0 ? pay : 0);

            if (emp.joiningDate && emp.joiningDate.trim() !== "") {
                newJoiners.push(emp);
            }
        });

        const expectedDays = db.length * activeConf.days;
        const attRate = expectedDays ? ((totalPresent / expectedDays) * 100).toFixed(1) : 0;
        const sortedDepts = Object.entries(deptCosts).sort((a,b) => b[1] - a[1]);

        const insights = [];
        if (attRate < 85 && db.length > 0) insights.push({ type: 'warning', icon: 'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z', color: 'text-warning', bg: 'bg-warning bg-opacity-10', border: 'border-warning', title: 'High Absenteeism Rate', msg: `Overall attendance is at ${attRate}%. Consider reviewing leave patterns or issues affecting the workforce.` });
        if (totalOTCost > (totalBasic * 0.15) && db.length > 0) insights.push({ type: 'error', icon: 'M13 7h8m0 0v8m0-8l-8 8-4-4-6 6', color: 'text-danger', bg: 'bg-danger bg-opacity-10', border: 'border-danger', title: 'Excessive Overtime Costs', msg: `OT accounts for >15% of basic payroll (₹${totalOTCost.toLocaleString(undefined, {maximumFractionDigits:0})}). Consider adjusting shift timings to reduce burnout.` });

        if (totalAdvance > (totalEarned * 0.2) && db.length > 0) insights.push({ type: 'warning', icon: 'M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z', color: 'text-secondary', bg: 'bg-secondary bg-opacity-10', border: 'border-secondary', title: 'High Advance Dependency', msg: 'Employees have requested over 20% of their earned salaries as advance payments. Review loan policies.' });
        if (insights.length === 0 && db.length > 0) insights.push({ type: 'success', icon: 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z', color: 'text-success', bg: 'bg-success bg-opacity-10', border: 'border-success', title: 'System Healthy', msg: 'Payroll and attendance metrics are well within healthy operational thresholds. No critical actions required.' });

        const topAbsent = [...db].sort((a, b) => (parseFloat(b.absent)||0) - (parseFloat(a.absent)||0)).slice(0, 5).filter(e => e.absent > 0);
        const topOT = [...db].sort((a, b) => (parseFloat(b.otHrs)||0) - (parseFloat(a.otHrs)||0)).slice(0, 5).filter(e => e.otHrs > 0);

        return { totalBasic, totalPayout, totalAdvance, totalOTCost, totalOTHours, totalAbsent, attRate, sortedDepts, insights, topAbsent, topOT, newJoiners };
    }, [db, activeConf]);

    window.addEventListener('keydown', handleGlobalEsc);

    if (!auth.hasPassword) {

        try { localStorage.setItem(PWD_KEY, btoa(passInput)); } catch(e){}
        setAuth({ isLocked: false, hasPassword: true, password: passInput });
        setPassInput("");
        notify("Master password created successfully!", "success");
    } else {
        if (passInput === auth.password) {
            setAuth({ ...auth, isLocked: false });
            setPassInput("");
            notify("Unlocked successfully!", "success");

    }

const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    Papa.parse(file, {
        complete: (res) => {
            try {
                const data = res.data;
                const parsed = [];
                for (let i = 0; i < data.length; i++) {
                    const row = data[i];
                    if (!row || row.length < 5) continue;
                    const n = String(row[1] || "").trim();
                    if (n && !["employee name", "department", "prepared by", "total due", "recheck by"].some(x => n.toLowerCase().includes(x))) {
                        const em = { id: Math.random().toString(36).substr(2, 9), srNo: String(row[0]||"").trim(), name: n, dept: String(row[2]||"").trim(), code: String(row[3]||"").trim() || `C-${i}`, type: String(row[4]||"").trim(), basicSalary: parseFloat(row[67]) || 0, previousBalance: parseFloat(row[80]) || 0, advance: parseFloat(row[82]) || 0, joiningDate: "" };
                        for (let d = 1; d <= activeConf.days; d++) { 
                            em[`d${d}`] = String(row[5+(d-1)*2]||"").trim(); 
                            em[`ot${d}`] = String(row[6+(d-1)*2]||"").trim(); 
                            em[`c${d}`] = "";
                            em[`in${d}`] = "";
                            em[`out${d}`] = "";
                        }
                        parsed.push(compute(em, activeConf));
                    }
                }
                if (parsed.length > 0) { setDb(parsed); notify(`Imported ${parsed.length} records into ${activeConf.label}`); } else notify("No valid data", "error");
            } catch (err) { notify("Parse error", "error"); }
            if (fileRef.current) fileRef.current.value = "";
        }
    });
};

            currentY = doc.lastAutoTable.finalY + 10;

        doc.setFontSize(8); doc.setTextColor(0, 0, 0); doc.setLineWidth(0.5); doc.setDrawColor(0, 0, 0);

        doc.line(106, finalY, 150, finalY); doc.text("Verified By", 128, finalY + 5, { align: 'center', fontStyle: 'bold' }); doc.text(pdfSigs.ver, 128, finalY + 9, { align: 'center' });
        doc.line(156, finalY, 196, finalY); doc.text("Final Approval", 176, finalY + 5, { align: 'center', fontStyle: 'bold' }); doc.text(pdfSigs.app, 176, finalY + 9, { align: 'center' });

        doc.save(`Arise_Verification_${activeConf.short}.pdf`);
        notify("Verification PDF Exported successfully!", "success");

    } catch (err) {

};

    setDb(prev => prev.map(e => e.id === selectedId ? compute({ ...e, ...updates }, activeConf) : e));

    if (!selectedId) return;

const handleTimeSelect = (timeStr) => {
    if (timeModal.step === 'in') {
        setTimeModal(prev => ({ ...prev, step: 'out', inVal: timeStr, custom: '' }));

        setDb(prev => prev.map(e => e.id === selectedId ? compute({ ...e, [`in${timeModal.day}`]: timeModal.inVal, [`out${timeModal.day}`]: timeStr }, activeConf) : e));
        setTimeModal({ show: false, day: null, step: 'in', inVal: '', outVal: '', custom: '' });
        setFocusDay(prev => Math.min(activeConf.days, prev + 1));

};

const getTimeBtnClass = (timeStr, step) => {
    const isHour = timeStr.includes(':00');
    const isHalf = timeStr.includes(':30');
    
    if (step === 'in') {
        if (isHour) return "btn btn-success font-bold text-white shadow-sm";
        if (isHalf) return "btn btn-outline-success font-semibold";
        return "btn btn-outline-secondary";
    } else {
        if (isHour) return "btn btn-danger font-bold text-white shadow-sm";
        if (isHalf) return "btn btn-outline-danger font-semibold";
        return "btn btn-outline-secondary";
    }
};

const handleMigrateEmployees = () => {
    const otherMonthKey = MONTHS.find(m => m.id !== activeMonthKey).id;
    const oldDb = dbs[otherMonthKey];
    if (!oldDb || oldDb.length === 0) return notify("No employees exist in the other month yet.", "error");
    if (confirm(`Copy ${oldDb.length} employees from the other month into ${activeConf.label}? All their attendance logic will start fresh.`)) {
        const copied = oldDb.map(e => {
            const newE = { ...e };
            for(let i=1; i<=31; i++) { delete newE[`d${i}`]; delete newE[`ot${i}`]; delete newE[`c${i}`]; delete newE[`in${i}`]; delete newE[`out${i}`]; }
            for(let i=1; i<=activeConf.days; i++) { newE[`d${i}`] = ""; newE[`ot${i}`] = ""; newE[`c${i}`] = ""; newE[`in${i}`] = ""; newE[`out${i}`] = ""; }
            newE.previousBalance = 0; newE.advance = 0;
            return compute(newE, activeConf);
        });
        setDb(copied); notify("Workforce migrated successfully!", "success");
    }
};

useEffect(() => {
    const handleGlobalKey = (e) => {
        if (otModal.show || commentModal.show || pdfModal.show || timeModal.show) return;
        if (activeTab !== 'employees') return;
        if (!selectedId) return;
        
        const activeTag = document.activeElement.tagName;
        if (activeTag === 'INPUT' || activeTag === 'TEXTAREA') return;

        if (['ArrowUp', 'ArrowDown'].includes(e.key) && !focusDay) {
            const curIdx = filtered.findIndex(x => x.id === selectedId);
            if (e.key === 'ArrowDown' && curIdx < filtered.length - 1) { setSelectedId(filtered[curIdx+1].id); e.preventDefault(); return; }
            if (e.key === 'ArrowUp' && curIdx > 0) { setSelectedId(filtered[curIdx-1].id); e.preventDefault(); return; }
        }

        if (!focusDay) return;
        if (e.key === 'ArrowRight') { setFocusDay(prev => Math.min(activeConf.days, prev + 1)); e.preventDefault(); }
        if (e.key === 'ArrowLeft') { setFocusDay(prev => Math.max(1, prev - 1)); e.preventDefault(); }
        if (e.key === 'ArrowUp') { setFocusDay(prev => Math.max(1, prev - 7)); e.preventDefault(); }
        if (e.key === 'ArrowDown') { setFocusDay(prev => Math.min(activeConf.days, prev + 7)); e.preventDefault(); }

        const key = e.key.toLowerCase();
        
        if (key === 'p') { 
            updateAtt(focusDay, 'P'); 
            setTimeModal({ show: true, day: focusDay, step: 'in', inVal: '', outVal: '', custom: '' });
            e.preventDefault(); 
        }
        
        if (['a', 'h', 't', 'w'].includes(key) || e.key === 'Backspace' || e.key === 'Delete') { 
            let val = '';
            if (key === 'a') val = 'A';
            if (key === 'h') val = 'H';
            if (key === 't') val = 'T';
            if (key === 'w') val = 'W/O';
            setDb(prev => prev.map(em => em.id === selectedId ? compute({ ...em, [`d${focusDay}`]: val, [`in${focusDay}`]: '', [`out${focusDay}`]: '' }, activeConf) : em));
            setFocusDay(prev => Math.min(activeConf.days, prev + 1)); 
            e.preventDefault();
        }
        
        if (key === 'm') {
            updateAtt(focusDay, 'P?');
            const em = db.find(x => x.id === selectedId);
            setCommentModal({ show: true, day: focusDay, val: em ? em[`c${focusDay}`] || "" : "" });
            e.preventDefault();
        }
        
        if (key === 'o' || e.key === 'Enter') { 
            const em = db.find(x => x.id === selectedId);
            setOtModal({ show: true, day: focusDay, val: em ? em[`ot${focusDay}`] : "" }); 
            e.preventDefault(); 
        }
        if (key === 'c') {
            const em = db.find(x => x.id === selectedId);
            setCommentModal({ show: true, day: focusDay, val: em ? em[`c${focusDay}`] || "" : "" });
            e.preventDefault();
        }
    };
    window.addEventListener('keydown', handleGlobalKey);
    return () => window.removeEventListener('keydown', handleGlobalKey);
}, [selectedId, focusDay, db, otModal.show, commentModal.show, pdfModal.show, timeModal.show, updateAtt, activeTab, activeConf.days]);

                <button onClick={() => setPdfModal({...pdfModal, show:false})} className="btn btn-sm btn-light font-bold text-slate-500">Cancel</button>
                <button onClick={executePDFExport} className="btn btn-sm btn-danger font-bold d-flex align-items-center gap-1.5 shadow">
                    <Icon path="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /> Generate PDF
                </button>
            </div>
        </div>
    </div>
)}

{otModal.show && (
    <div className="custom-modal-overlay">
        <div className="bg-white rounded-3 p-4 shadow-lg text-center" style={{ width: '100%', maxWidth: '320px' }}>
            <h3 className="h6 font-black text-slate-800 mb-3 d-flex align-items-center justify-content-center gap-2">
                <Icon path="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" className="text-brand-500"/> Day {otModal.day} Overtime/Penalty
            </h3>
            <div className="mb-4">
                <input type="number" step="0.5" ref={otInputRef} value={otModal.val} onChange={e => setOtModal({...otModal, val: e.target.value})} onKeyDown={e => { if(e.key === 'Enter') updateOt(otModal.day, otModal.val); }} className="form-control form-control-lg text-center font-black text-slate-800 bg-light border-2 py-3" placeholder="0.0" />
                <p className="fs-8 font-bold text-slate-400 mt-2 m-0">Use negative (-) for penalty</p>
            </div>
            <div className="d-flex gap-2 justify-content-center">
                <button onClick={() => setOtModal({...otModal, show:false})} className="btn btn-sm btn-light font-bold text-slate-500">Cancel</button>
                <button onClick={() => updateOt(otModal.day, otModal.val)} className="btn btn-sm btn-primary font-bold shadow">Save OT</button>
            </div>
        </div>
    </div>
)}

{commentModal.show && (
    <div className="custom-modal-overlay">
        <div className="bg-white rounded-3 p-4 shadow-lg" style={{ width: '100%', maxWidth: '380px' }}>
            <h3 className="h6 font-black text-slate-800 mb-3 d-flex align-items-center gap-2">
                <Icon path="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z" className="text-brand-500"/> Date Comment - Day {commentModal.day}
            </h3>
            <div className="mb-4">
                <textarea ref={commentInputRef} value={commentModal.val} onChange={e => setCommentModal({...commentModal, val: e.target.value})} className="form-control text-slate-800 bg-light border-2 p-3" style={{ resize: 'none', height: '120px' }} placeholder="Add a comment about this day (e.g. Missing punch time, Late by 1 hr, etc...)" />
            </div>
            <div className="d-flex gap-2 justify-content-end">
                <button onClick={() => setCommentModal({...commentModal, show:false})} className="btn btn-sm btn-light font-bold text-slate-500">Cancel</button>
                <button onClick={() => updateComment(commentModal.day, commentModal.val)} className="btn btn-sm btn-primary font-bold shadow">Save Note</button>
            </div>
        </div>
    </div>
)}

{toast && (
    <div className="position-fixed bottom-0 end-0 p-3" style={{ zIndex: 1100 }}>
        <div className={`toast show align-items-center border-0 text-white p-2 ${toast.type === 'error' ? 'bg-danger' : 'bg-dark'}`} role="alert" aria-live="assertive" aria-atomic="true">
            <div className="d-flex">
                <div className="toast-body d-flex align-items-center gap-2 font-bold fs-7">
                    <Icon path={toast.type==='error'?"M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z":"M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"} />
                    {toast.msg}
                </div>
            </div>
        </div>
    </div>
)}

</div>
);
};

const r = ReactDOM.createRoot(document.getElementById('root'));
r.render(<App />);
</script>
</body>
</html>
